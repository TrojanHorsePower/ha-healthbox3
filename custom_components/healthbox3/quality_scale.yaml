rules:
  # Bronze
  action-setup: exempt
    # No custom service actions are registered - boost and profile control
    # are exposed via standard fan/select entities instead.
  appropriate-polling: done
    # DataUpdateCoordinator with a 30s default interval (const.DEFAULT_SCAN_INTERVAL).
  brands: done
    # Local brand images in custom_components/healthbox3/brand/ (icon.png,
    # icon@2x.png, logo.png, logo@2x.png) - since HA 2026.3.0, custom
    # integrations can ship these directly and take precedence over the
    # brands repository, so a home-assistant/brands PR is no longer the
    # path for this (confirmed against that repo's own README, which
    # points integrations at this local mechanism instead). Renson's own
    # Healthbox 3 branding, not a generic substitute - see README's
    # non-affiliation disclaimer. No dark_icon/dark_logo variants shipped;
    # HA falls back to the light variant for dark mode, which is an
    # accepted, supported configuration per the local-brands mechanism,
    # not a gap.
  common-modules: done
    # const.py, api.py, coordinator.py, entity.py are shared across platforms.
  config-flow-test-coverage: done
    # tests/test_config_flow.py covers success (with/without key), cannot_connect,
    # invalid_api_key, duplicate-device abort, reauth (success + failure),
    # broadcast discovery (single/multiple/none/already-configured-filtered),
    # the post-manual-entry unicast enrichment probe (responds/no reply),
    # and both relocate flows sharing _async_relocate_or_abort
    # (integration_discovery and dhcp: success, cannot_connect, no
    # matching entry, each).
  config-flow: done
    # config_flow.py with translated field descriptions in strings.json.
  dependency-transparency: done
    # No extra PyPI requirements; only aiohttp, which ships with HA core.
  docs-actions: exempt
    # No custom service actions.
  docs-triggers: exempt
    # No custom device triggers.
  docs-conditions: exempt
    # No custom device conditions.
  docs-high-level-description: done
    # README describes the device and what the integration does.
  docs-installation-instructions: done
    # README covers manual/HACS install plus the API-key request prerequisite.
  docs-removal-instructions: done
    # README documents removal via the standard UI flow.
  entity-event-setup: done
    # Entities subscribe via CoordinatorEntity, which handles
    # async_added_to_hass/async_will_remove_from_hass listener (un)registration.
  entity-unique-id: done
    # Every entity sets _attr_unique_id from the device serial + room/type.
  has-entity-name: done
    # Healthbox3Entity sets _attr_has_entity_name = True.
  runtime-data: done
    # entry.runtime_data holds the coordinator (see coordinator.Healthbox3ConfigEntry).
  test-before-configure: done
    # config_flow's user step calls /v1/api/data/current before creating the entry.
  test-before-setup: done
    # __init__.py raises ConfigEntryNotReady if the initial API key check
    # or coordinator first refresh fails.
  unique-config-entry: done
    # unique_id is the device serial; _abort_if_unique_id_configured prevents duplicates.

  # Silver
  action-exceptions: exempt
    # No custom service actions.
  config-entry-unloading: done
    # async_unload_entry unloads all platforms.
  docs-configuration-parameters: done
    # README documents the host and optional API key fields.
  docs-installation-parameters: done
    # README documents what host/API key are for and how to obtain them.
  entity-unavailable: done
    # Every entity's `available` property reflects real device/data state
    # (empty-parameter sensors, missing boost/profile data, removed rooms,
    # and missing decision/breeze/room-decision data for the demand
    # control/breeze/silent/CO2-threshold entities).
  integration-owner: done
    # manifest.json codeowners is set.
  log-when-unavailable: done
    # Inherited from DataUpdateCoordinator, which logs once on failure and
    # once on recovery rather than on every poll.
  parallel-updates: done
    # PARALLEL_UPDATES = 0 set in sensor.py/fan.py/select.py/switch.py/
    # number.py/time.py: entities only read from the coordinator, which
    # itself serializes device polling.
  reauthentication-flow: done
    # config_flow's async_step_reauth/reauth_confirm, triggered by the
    # coordinator via ConfigEntry.async_start_reauth on a confirmed-invalid key.
  test-coverage: done
    # Measured via pytest-cov: 97% line coverage (244 tests) across config
    # flow, coordinator, entities, diagnostics, real automation-engine
    # dispatch, and the unicast and broadcast UDP discovery implementations
    # (exercised through a fake datagram transport wired to the real
    # _DiscoveryProtocol/_BroadcastDiscoveryProtocol, not mocked past it).
    # Remaining gaps are defensive except-branches that are inherently hard
    # to trigger deliberately (malformed-shape parse failures on
    # already-200-OK responses).

  # Gold
  devices: done
    # One DeviceInfo per Healthbox unit, keyed on serial.
  diagnostics: done
    # diagnostics.py dumps entry data, healthbox state, and boost params,
    # redacting serial/warranty/valve_warranty/host/api_key/MAC/IP and any
    # address or serial-embedded device-name fields the device may expose.
  discovery-update-info: done
    # Two independent, complementary triggers, both converging on
    # ConfigFlow._async_relocate_or_abort (re-validate via HTTP, then the
    # standard _abort_if_unique_id_configured(updates=...) path):
    #
    # 1. On a connection error, the coordinator makes one best-effort
    #    active UDP broadcast discovery attempt (not on every failed poll
    #    - once per outage, reset on the next successful poll) and, if a
    #    response's serial matches this entry's own unique_id at a
    #    different IP, triggers a real config flow (source
    #    integration_discovery, via homeassistant.helpers.discovery_flow).
    # 2. Healthbox 3 devices also broadcast a DHCP hostname of the form
    #    "HEALTHBOX3<serial>" - confirmed via HA's own DHCP integration
    #    page on one real device (firmware 2.6.9), previously missed when
    #    this entry was first written. manifest.json's "dhcp" key
    #    (hostname-only match, deliberately never macaddress - a device's
    #    MAC changes if it's ever moved between WiFi and Ethernet, the
    #    hostname doesn't) dispatches Home Assistant's standard
    #    async_step_dhcp for this, real passive discovery this time, not
    #    internally triggered.
    #
    # Both resolve on their flow's first step (no form ever shown, a
    # fully silent, invisible-to-the-user reconnect) and neither creates
    # a new entry for an unmatched serial - relocating a known device is
    # deliberately kept separate from discovering a new one.
    #
    # DHCP discovery closes the one gap broadcast-only relocate couldn't:
    # an entry that has never successfully connected even once (stuck in
    # SETUP_RETRY from initial setup) has no running coordinator to
    # trigger a broadcast attempt, but async_step_dhcp fires from HA's own
    # watcher regardless of any entry's state, the moment a matching
    # device's next DHCP lease event is observed. Not instant or
    # guaranteed (depends on that lease event actually happening), but no
    # longer strictly uncovered - see README "Known limitations".
  discovery: done
    # The user step attempts UDP broadcast discovery (api.py's
    # async_discover_broadcast) before showing any form, already-configured
    # devices filtered out. Exactly one new device skips straight to a
    # confirm step; multiple offer a selection list; zero (broadcast is
    # confirmed unreliable on some networks - see README known limitations)
    # falls through to manual IP entry with no error shown - a normal
    # outcome, not a failure state.
  docs-data-update: done
    # README explains the v1/v2 poll behavior and interval.
  docs-examples: done
    # README "Examples" section: humidity-triggered per-room boost,
    # AQI-triggered boost-all, and time-based profile switching - real
    # automations against this integration's actual entities, not filler.
  docs-known-limitations: done
    # README documents broadcast-discovery's unreliability/silent fallback
    # to manual entry, and v1-only fallback behavior, explicitly.
  docs-supported-devices: done
    # README states this targets Healthbox 3.0 only.
  docs-supported-functions: done
    # README lists all entities/platforms.
  docs-troubleshooting: done
    # README "Troubleshooting" section: connection failures, API key
    # rejection/expiry, the empty-CO2-sensor-until-warmed-up quirk, the
    # boost restart-not-adjust quirk, and entities disappearing on key
    # expiry (point to the reauth prompt, not a bug report).
  docs-use-cases: done
    # README "Use cases" section: whole-house monitoring, targeted
    # humidity/CO2-triggered boosting, one-press boost-all, and automated
    # profile switching.
  dynamic-devices: exempt
    # Exactly one device per config entry; rooms are entities, not devices,
    # and are not added/removed outside a full reconfigure.
  entity-category: done
    # Evaluated every entity class. Sensors (temperature/humidity/CO2/VOC/
    # AQI, global AQI, global ventilation level), the profile select, and
    # both boost fan entities are all primary measurements or primary
    # interactive controls - the whole reason a user installs this
    # integration - so none of those get a category. The demand control/
    # breeze/silent switches, minimum ventilation/breeze temperature/CO2
    # threshold/silent reduction numbers, and silent start/stop times are
    # all device *configuration* (how the device behaves, not something
    # to look at or act on day to day), so those all get
    # EntityCategory.CONFIG. The firmware version and device errors
    # sensors are both EntityCategory.DIAGNOSTIC - textbook diagnostic
    # info, neither a primary measurement nor a control.
  entity-device-class: done
    # Set for temperature/humidity/CO2; deliberately omitted for VOC/AQI, which
    # have no matching standard HA device class for this device's proprietary scales.
  entity-disabled-by-default: done
    # Every entity evaluated individually, not just inherited from
    # entity-category's reasoning. The one real candidate was the airflow
    # sensor (arguably more "supplementary/technical" than temperature/
    # humidity/CO2/AQI) - deliberately left enabled: it's a direct way to
    # confirm whether boost is actually increasing flow, not just a nice-
    # to-have reading, and a user shouldn't need to already know it exists
    # to enable it for that troubleshooting purpose. No other primary
    # sensor/control here is noisy or supplementary.
    #
    # The demand control/breeze/silent switches, minimum ventilation/
    # breeze temperature/CO2 threshold/silent reduction numbers, and
    # silent start/stop times (all EntityCategory.CONFIG - see
    # entity-category above) were evaluated separately from that primary-
    # entity reasoning, not swept in by it: a user who's gone to the
    # trouble of activating an API key specifically to reach these
    # settings wants them visible immediately, not hidden behind an extra
    # "enable this entity" step - none are high-frequency, noisy, or
    # genuinely optional in a way that would justify defaulting them off.
    #
    # The firmware version sensor (EntityCategory.DIAGNOSTIC) is also left
    # enabled by default, for the same class of reason as airflow: its
    # whole purpose is to be a glanceable signal that a firmware update
    # happened, since several assumptions elsewhere in this client are
    # only confirmed against one firmware version - a user shouldn't need
    # to already know to look for that signal to have it available.
    #
    # The device errors sensor (EntityCategory.DIAGNOSTIC) is also left
    # enabled by default: it complements, not duplicates, the repair
    # issues the coordinator creates per error (see repair-issues below)
    # by giving passive/automatable visibility (e.g. "notify me if this
    # is ever above 0") into the exact same data, so hiding it behind an
    # extra opt-in step would undercut the reason it exists.
  entity-translations: done
    # strings.json/translations/en.json cover every entity's translation_key.
  exception-translations: done
    # The three HomeAssistantError raises (select.py's and fan.py's
    # "room no longer present" guard, fan.py's boost-all partial-failure)
    # all use translation_domain/translation_key/translation_placeholders
    # instead of an f-string message, resolved via strings.json's
    # top-level "exceptions" key.
  icon-translations: done
    # icons.json covers every entity translation_key (all sensors, the
    # profile select, both boost fans, and the demand control/breeze/
    # silent switches, minimum ventilation/breeze temperature/CO2
    # threshold/silent reduction numbers, and silent start/stop times).
    # Sensors with a matching HA device_class (temperature/humidity/CO2)
    # use its usual icon explicitly; the ones without one (VOC/AQI/
    # airflow, all on proprietary scales - see entity-device-class above)
    # get a deliberately chosen icon instead of falling back to a generic
    # default. State-based overrides: room_profile shows a different
    # icon per eco/health/intense value, and both boost fans show
    # mdi:fan-off specifically when off rather than a generic fan icon
    # regardless of state.
  reconfiguration-flow: done
    # config_flow.py's async_step_reconfigure lets the user update the IP
    # and/or API key in place. Re-validates connectivity and, via
    # async_set_unique_id + _abort_if_unique_id_mismatch, confirms it's
    # still the same device by serial - not just something else answering
    # at the new IP. A blank API key field leaves the stored key untouched
    # (data_updates only overrides included keys).
  repair-issues: done
    # Two failure modes were considered separately, not swept together:
    #
    # 1. A bad/expired API key and a changed IP address are already
    #    handled by more specific, more correct mechanisms - the standard
    #    reauthentication flow (reauthentication-flow above) and
    #    automatic self-healing reconnect (discovery-update-info above)
    #    respectively - with no user action possible or needed, so
    #    neither warrants a repair issue on top.
    # 2. Real device-reported faults (GET /v1/error - {code, time,
    #    description, association_id, severity: "critical"|"warning"})
    #    are a separate, genuinely actionable condition this integration
    #    can detect, and now get one: coordinator.py's
    #    _async_reconcile_error_issues creates one issue_registry issue
    #    per currently-reported error (keyed on association_id) every
    #    poll, and deletes any previously-tracked issue whose error is no
    #    longer present - self-healing, no user action required to
    #    dismiss a resolved one. Deliberately is_fixable=False: the only
    #    device-side clear action (DELETE /v1/error/clear, intentionally
    #    never called from this client - see API_V1_ERROR's comment in
    #    const.py) is bulk-only with no per-error variant, which doesn't
    #    map onto HA's naturally per-issue repair model - wiring a "Fix"
    #    button to it would risk dismissing unrelated errors alongside
    #    the one the user meant to act on, so clearing stays a manual
    #    device/Renson-app action and these issues exist purely to
    #    inform. A complementary sensor.device_errors (see
    #    entity-category below) gives passive/automatable visibility
    #    alongside the same data.
    #
    # This conclusion revisits and replaces an earlier version of this
    # entry that reasoned "no other condition this integration can
    # detect is something a user can fix from within Home Assistant" -
    # written before GET /v1/error's real shape had been confirmed, and
    # incorrect once it was.
  stale-devices: exempt
    # Single static device per entry; nothing to detect as stale.

  # Platinum
  async-dependency: done
    # aiohttp is natively async; no sync dependency wrapped in an executor.
  inject-websession: done
    # Healthbox3ApiClient takes the shared session via async_get_clientsession(hass).
  strict-typing: done
    # mypy.ini holds the same flag set core applies to integrations listed
    # in its own .strict-typing file - confirmed by reading a real core
    # checkout's generated mypy.ini rather than assuming `mypy --strict`
    # (broader, would over-report) is equivalent. Custom/HACS integrations
    # have no equivalent opt-in mechanism, so this is this project's own
    # self-verification, enforced in CI (see .github/workflows/mypy.yml).
    # runtime-data's special condition (a custom typed ConfigEntry used
    # throughout) was already satisfied before this rule was tackled -
    # Healthbox3ConfigEntry has been used everywhere since it was
    # introduced. The py.typed/PEP-561 note in this rule's docs is about
    # a maintained typed dependency library, not the integration itself
    # (confirmed against the rule's raw source text) - not applicable,
    # this project has zero PyPI dependencies beyond aiohttp (see
    # dependency-transparency above).
    # Rolled out one file/group at a time across several commits ("git log
    # --grep strict-typing"), each verified independently before the next.
    # Genuine typing gaps found along the way, not just annotations:
    # sensor.py's nominal/flow_rate parsing now handles a non-numeric
    # value gracefully instead of assuming Parameter.value is always a
    # float (see the dedicated commit for that fix); number.py's CO2
    # threshold write and time.py's two silent-schedule writes read
    # sibling state that's only guaranteed non-None because `available`
    # already gates the call - documented with an assert at each site
    # rather than restructured, since HA's own entity lifecycle is what
    # actually enforces the invariant.
