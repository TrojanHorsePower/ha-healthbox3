# Config for the "strict-typing" Home Assistant quality scale rule.
#
# The [mypy-custom_components.healthbox3.*] block below is not a generic
# "strict mode" - it's the exact flag set core applies to integrations
# listed in its own .strict-typing file (confirmed by reading a real
# checkout's generated mypy.ini, not assumed from `mypy --strict`, which
# is broader and would over-report here). Custom/HACS integrations have
# no equivalent opt-in mechanism, so this file is this project's own
# self-verification.
#
# Rolled out one file/group at a time (see commit history:
# "strict-typing stage N: ..."), now collapsed to the single wildcard
# below since every file in the package is clean under it.

[mypy]
python_version = 3.14
platform = linux
show_error_codes = true
follow_imports = normal
local_partial_types = true
strict_equality = true
strict_bytes = true
no_implicit_optional = true
warn_incomplete_stub = true
warn_redundant_casts = true
warn_unused_ignores = true
enable_error_code = deprecated, explicit-override, ignore-without-code, redundant-self, truthy-iterable
disable_error_code = annotation-unchecked, import-not-found, import-untyped
extra_checks = false

[mypy-custom_components.healthbox3.*]
check_untyped_defs = true
disallow_incomplete_defs = true
disallow_subclassing_any = true
disallow_untyped_calls = true
disallow_untyped_decorators = true
disallow_untyped_defs = true
warn_return_any = true
warn_unreachable = true
