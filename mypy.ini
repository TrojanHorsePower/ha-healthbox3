# Config for the "strict-typing" Home Assistant quality scale rule.
#
# The [mypy-custom_components.healthbox3.*] block below is not a generic
# "strict mode" - it's the exact flag set core applies to integrations
# listed in its own .strict-typing file (confirmed by reading a real
# checkout's generated mypy.ini, not assumed from `mypy --strict`, which
# is broader and would over-report here). Custom/HACS integrations have
# no equivalent opt-in mechanism, so this file - plus the modules
# actually listed below - is this project's own self-verification.
#
# Rolled out one file/group at a time (see CHANGELOG/commit history) -
# only modules listed under [mypy-custom_components.healthbox3.*] via
# their own explicit section (or the trailing wildcard once every file
# is covered) are held to this standard. Add a file to the list only
# once it's actually clean under it.

[mypy]
python_version = 3.14
platform = linux
show_error_codes = true
follow_imports = normal
local_partial_types = true
strict_equality = true
strict_bytes = true
no_implicit_optional = true
warn_incomplete_stub = true
warn_redundant_casts = true
warn_unused_ignores = true
enable_error_code = deprecated, explicit-override, ignore-without-code, redundant-self, truthy-iterable
disable_error_code = annotation-unchecked, import-not-found, import-untyped
extra_checks = false

[mypy-custom_components.healthbox3.api]
check_untyped_defs = true
disallow_incomplete_defs = true
disallow_subclassing_any = true
disallow_untyped_calls = true
disallow_untyped_decorators = true
disallow_untyped_defs = true
warn_return_any = true
warn_unreachable = true

