name: HACS Validate

on:
  push:
    paths-ignore:
      - ".gitignore"
      - "LICENSE"
      - "CLAUDE.md"
      - "README.md"
      - "CHANGELOG.md"
      - "CONTRIBUTING.md"
  pull_request:
    paths-ignore:
      - ".gitignore"
      - "LICENSE"
      - "CLAUDE.md"
      - "README.md"
      - "CHANGELOG.md"
      - "CONTRIBUTING.md"
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  validate-hacs:
    runs-on: "ubuntu-latest"
    steps:
      - name: HACS validation
        uses: "hacs/action@main"
        with:
          category: "integration"
